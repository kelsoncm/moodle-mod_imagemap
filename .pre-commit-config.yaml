repos:
  - repo: local
    hooks:
      - id: moodle-codechecker
        name: Moodle Code Checker
        description: 'Run Moodle CodeSniffer standard on plugin'
        entry: .githooks/run-moodle-plugin-ci-v4.sh codechecker .
        language: script
        pass_filenames: false
        stages: [pre-commit]
        require_serial: true

      - id: moodle-phpmd
        name: Moodle PHPMD
        description: 'Run PHP Mess Detector on plugin'
        entry: .githooks/run-moodle-plugin-ci-v4.sh phpmd .
        language: script
        pass_filenames: false
        stages: [pre-commit]
        require_serial: true

      - id: moodle-validate
        name: Moodle Validate
        description: 'Validate plugin structure'
        entry: .githooks/run-moodle-plugin-ci-v4.sh validate .
        language: script
        pass_filenames: false
        stages: [pre-commit]
        require_serial: true

      - id: moodle-savepoints
        name: Moodle Savepoints
        description: 'Check upgrade savepoints'
        entry: .githooks/run-moodle-plugin-ci-v4.sh savepoints .
        language: script
        pass_filenames: false
        stages: [pre-commit]
        require_serial: true

      - id: moodle-mustache
        name: Mustache Lint
        description: 'Check Mustache template syntax'
        entry: .githooks/run-moodle-plugin-ci-v4.sh mustache .
        language: script
        pass_filenames: false
        stages: [pre-commit]

      - id: php-lint
        name: Moodle PHP Lint
        description: 'Run moodle-plugin-ci phplint on plugin'
        entry: .githooks/run-moodle-plugin-ci-v4.sh phplint .
        language: script
        pass_filenames: false
        stages: [pre-commit]

  # Standard checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 'v4.5.0'
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        types: [php, markdown, yaml]

      - id: end-of-file-fixer
        name: Fix end of file
        types: [php, markdown, yaml]

      - id: check-yaml
        name: Check YAML syntax
        files: '\.(yaml|yml)$'

      - id: check-merge-conflict
        name: Check for merge conflicts
